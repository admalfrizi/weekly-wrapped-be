version: '3.8'

services:
  db-dev:
    image: postgres:latest
    container_name: dev_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lokal26}
      POSTGRES_DB: ${DB_NAME:-weekly-wrapped-db}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-root} -d ${DB_NAME:-weekly-wrapped-db}"]
      interval: 2s
      timeout: 5s
      retries: 5
    networks:
      - dev-network

  migrator-dev:
    image: migrate/migrate
    container_name: dev_migrator
    volumes:
      - ./db/migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://${DB_USER:-root}:${DB_PASSWORD:-lokal26}@db-dev:5432/${DB_NAME:-weekly-wrapped-db}?sslmode=disable
      - up
    depends_on:
      db-dev:
        condition: service_healthy
    networks:
      - dev-network

  backend-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: dev_backend
    volumes:
      - ./:/app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db-dev
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-lokal26}
      - DB_NAME=${DB_NAME:-weekly-wrapped-db}
      - DB_PORT=5432
    depends_on:
      migrator-dev:
        condition: service_completed_successfully
      db-dev:
        condition: service_started
    networks:
      - dev-network

networks:
  dev-network:
    driver: bridge